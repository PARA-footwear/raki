# Простий та надійний робочий процес для автоматичного деплою на GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master # Підтримує обидві стандартні назви гілок

# Дозволи для деплою через вбудований механізм GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Створюємо одну чергу для деплою, щоб уникнути конфліктів
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
